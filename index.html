<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OSINT ZEUS</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#2563eb">
    
    <link rel="icon" href="https://zeus-rr.github.io/osint/simbolo.ico" type="image/x-icon">
    
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" />
    <link rel="stylesheet" href="https://cdn.datatables.net/1.13.1/css/jquery.dataTables.min.css" />
    
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>

    <style>
        :root { 
            --bg: #0f172a; 
            --card: #1e293b; 
            --accent: #3b82f6; 
            --text: #e2e8f0; 
            --danger: #ef4444; 
            --success: #10b981; 
        }
        
        body { 
            background-color: var(--bg); 
            color: var(--text); 
            font-family: 'Inter', sans-serif; 
            overflow-x: hidden; 
            padding-bottom: 30px;
        }

        .card { 
            background: var(--card); 
            border: 1px solid #334155; 
            border-radius: 12px; 
            transition: 0.3s; 
            margin-bottom: 20px;
        }

        .progress { height: 6px; background-color: #334155; display: none; margin-bottom: 20px; border-radius: 10px; }
        .progress-bar { background: linear-gradient(90deg, #3b82f6, #8b5cf6); }
        
        .btn-osint {
            width: 100%; background: #0f172a; border: 1px solid #334155; color: #94a3b8;
            padding: 10px 14px; border-radius: 8px; font-size: 12px; text-align: left;
            transition: 0.2s; margin-bottom: 6px; display: flex; align-items: center; gap: 10px;
        }
        
        .btn-osint:hover { 
            background: #3b82f622; 
            color: white; 
            border-color: var(--accent); 
            transform: translateX(5px); 
        }

        #targetUsername { 
            background: #0f172a; 
            color: var(--accent); 
            border: 1px solid #334155; 
            font-weight: 600; 
        }

        @media (max-width: 576px) {
            .input-group {
                flex-direction: column;
                gap: 12px;
            }
            .input-group > .form-control {
                width: 100% !important;
                border-radius: 8px !important;
                height: 55px;
                font-size: 16px !important;
            }
            .input-group-append .btn {
                width: 100%;
                border-radius: 8px !important;
                height: 50px;
            }
        }

        .section-title { 
            font-size: 10px; font-weight: 800; text-transform: uppercase; 
            color: #64748b; letter-spacing: 1px; margin: 15px 0 8px 5px;
        }

        table.dataTable { background: var(--card) !important; color: white !important; }
        .dataTables_wrapper .dataTables_filter input { color: white; border: 1px solid #334155; background: #0f172a; border-radius: 4px; }
        .badge-cat { font-size: 10px; padding: 4px 8px; border-radius: 20px; background: #334155; }
        .alert-popup { font-size: 11px; background: #3b82f622; border: 1px dashed var(--accent); color: #94a3b8; border-radius: 8px; padding: 10px; margin-bottom: 15px; }
    </style>
</head>
<body>

<div class="container-fluid mt-3">
    <div class="row">
        <div class="col-12 col-md-4 col-lg-3">
            <div class="card p-3 shadow-lg">
                <div class="text-center mb-3">
                    <img src="https://zeus-rr.github.io/osint/simbolo.ico" style="width:50px;height:50px;">
                    <h6 class="text-white font-weight-bold">OSINT OPINFO</h6>
                </div>
                
                <p class="section-title text-info">Criminal & Judicial</p>
                <button onclick="quickSearch('jusbrasil')" class="btn-osint"><i data-lucide="gavel"></i> JusBrasil</button>
                <button onclick="quickSearch('escavador')" class="btn-osint"><i data-lucide="search"></i> Escavador</button>
                
                <p class="section-title text-warning">Análise de Sentimento</p>
                <button onclick="sentimentSearch('pos')" class="btn-osint text-success">Favoráveis</button>
                <button onclick="sentimentSearch('neg')" class="btn-osint text-danger">Desfavoráveis</button>
                <button onclick="sentimentSearch('total')" class="btn-osint">Todas Noticias</button>
        
                <p class="section-title text-primary">Redes Sociais</p>
                <button onclick="quickSearch('images')" class="btn-osint">Imagens</button>
                <button onclick="quickSearch('linkedin')" class="btn-osint">LinkedIn</button>
                <button onclick="quickSearch('social_all')" class="btn-osint">Pegada Total</button>
                <button onclick="quickSearch('facebook')" class="btn-osint">Facebook</button>
                <button onclick="quickSearch('instagram')" class="btn-osint">Instagram</button>
            </div>
        </div>

        <div class="col-12 col-md-8 col-lg-9">
            <div class="card p-4 shadow-lg">
                <div class="alert-popup">Habilite pop-ups no navegador.</div>

                <h4>Painel de Inteligência</h4>

                <div class="input-group mb-4">
                    <input type="text" class="form-control" id="targetUsername">
                    <div class="input-group-append">
                        <button class="btn btn-primary" onclick="startAutomatedScan()">SCAN</button>
                    </div>
                </div>

                <div class="progress" id="scanProgress">
                    <div class="progress-bar"></div>
                </div>

                <table id="collectiontable" class="table table-dark">
                    <thead>
                        <tr>
                            <th>Fonte</th>
                            <th>Categoria</th>
                            <th>Status</th>
                            <th>Link</th>
                        </tr>
                    </thead>
                    <tbody></tbody>
                </table>

                <button onclick="exportToPDF()" id="btnExport" style="display:none">Exportar PDF</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
<script src="https://cdn.datatables.net/1.13.1/js/jquery.dataTables.min.js"></script>

<script>
$(document).ready(function(){

    if(window.lucide){ lucide.createIcons(); }

    if("serviceWorker" in navigator){
        navigator.serviceWorker.register("sw.js");
    }

    window.table = $('#collectiontable').DataTable({paging:false,info:false});

});

const osintEngines = [
    { name:'JusBrasil', cat:'Judicial', url:'https://www.jusbrasil.com.br/busca?q={}' },
    { name:'Escavador', cat:'Judicial', url:'https://www.escavador.com/busca?q={}' },
    { name:'Google', cat:'Geral', url:'https://www.google.com/search?q={}' }
];

async function startAutomatedScan(){
    let user = targetUsername.value.trim();
    if(!user) return alert("Digite algo");

    table.clear().draw();
    $('#scanProgress').show();

    for(let i=0;i<osintEngines.length;i++){
        let url = osintEngines[i].url.replace("{}",encodeURIComponent(user));

        window.open(url,'_blank','noopener');

        table.row.add([
            osintEngines[i].name,
            osintEngines[i].cat,
            "OK",
            `<a href="${url}" target="_blank">Abrir</a>`
        ]).draw();

        $('.progress-bar').css('width',((i+1)/osintEngines.length*100)+'%');

        await new Promise(r=>setTimeout(r,400));
    }

    $('#btnExport').show();
}

function sentimentSearch(type){
    let user = targetUsername.value.trim();
    if(!user) return;

    let dork = "";
    if(type==="pos") dork="sucesso";
    else if(type==="neg") dork="crime";

    window.open(`https://google.com/search?q=${user}+${dork}`,'_blank','noopener');
}

function quickSearch(type){
    let user = targetUsername.value.trim();
    if(!user) return;

    let url = `https://google.com/search?q=${user}`;
    window.open(url,'_blank','noopener');
}

function exportToPDF(){
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();

    doc.text("Relatório OSINT",10,10);
    doc.save("relatorio.pdf");
}
</script>

</body>
</html>
